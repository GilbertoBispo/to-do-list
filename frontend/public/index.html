<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images/clipboard-check.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles.css">
    <title>Lista de Tarefas</title>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>

    <main>
        <!-- div para adicionar tarefas -->
        <div class="adicionar-tarefa">
            <input type="text" name="tarefa" placeholder="Nome da tarefa">
            <input type="text" name="descrição" placeholder="Descrição">
            <button type="submit">Criar</button>
        </div> <!-- adicionar-tarefa -->

        <!-- div que exibe todas as tarefas -->
        <div class="lista-tarefas">
            <ul>
                <li>Tarefa 1</li>
                <li>Tarefa 2</li>
                <li>Tarefa 3</li>
            </ul>
        </div> <!-- lista-tarefas -->
    </main>

    <script
        src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
        crossorigin="anonymous">
    </script>
    <script src="./script.js"></script>
</body>
</html>
