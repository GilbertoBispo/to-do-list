<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" href="/frontend/images/clipboard-check.svg" type="image/x-icon">
    <title>Lista de Tarefas</title>
</head>
<body>
    <header>
        <h1>Lista de Tarefas</h1>
    </header>

    <main>
        <!-- div para adicionar tarefas -->
        <div class="adicionar-tarefa">
            <!-- precisa do atributo "method" com valor "POST", e o URL do "action" precisa ser igual à URL indicada na rota POST do backend -->
            <form action="/" method="POST">
                <!-- os atributos "name" precisam condizer com os atributos do backend -->
                <input type="text" name="tarefa" placeholder="Nome da tarefa">
                <input type="text" name="descricao" placeholder="Descrição">
                <input type="submit" value="Enviar">
            </form>
        </div> <!-- adicionar-tarefa -->

        <!-- div que exibe todas as tarefas -->
        <div class="lista-tarefas">
            
            <ul class="lista">
            </ul>
        </div> <!-- lista-tarefas -->
    </main>

    <script
        src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
        crossorigin="anonymous">
    </script>
    <script src="./script.js"></script>
</body>
</html>
